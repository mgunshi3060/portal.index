<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>管理者ページ — 社内ポータル</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --green:#1D9E75;--green-d:#0F6E56;--green-dd:#085041;--green-l:#E1F5EE;
  --red:#E24B4A;--red-l:#FCEBEB;
  --amber:#EF9F27;--amber-l:#FAEEDA;
  --blue:#378ADD;--blue-l:#E6F1FB;
  --bg:#f5f4f1;--surface:#fff;--border:rgba(0,0,0,0.1);
  --text:#1a1a1a;--text2:#666;--text3:#999;
  --radius:8px;--radius-lg:12px;
}
body{font-family:'Hiragino Sans','Yu Gothic UI',sans-serif;font-size:14px;color:var(--text);background:var(--bg);}

/* ===== LOGIN ===== */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--green-dd) 0%,var(--green-d) 100%);}
.login-box{background:var(--surface);border-radius:16px;padding:40px 36px;width:340px;box-shadow:0 8px 32px rgba(0,0,0,0.18);}
.login-logo{width:44px;height:44px;background:var(--green);border-radius:10px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;}
.login-logo svg{width:22px;height:22px;fill:white;}
.login-title{text-align:center;font-size:16px;font-weight:700;margin-bottom:4px;}
.login-sub{text-align:center;font-size:12px;color:var(--text2);margin-bottom:28px;}
.login-label{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;display:block;}
.login-input{width:100%;height:40px;border:0.5px solid var(--border);border-radius:var(--radius);padding:0 12px;font-size:14px;margin-bottom:14px;outline:none;transition:border-color .15s;}
.login-input:focus{border-color:var(--green);}
.login-btn{width:100%;height:40px;background:var(--green);color:white;border:none;border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer;transition:background .15s;margin-top:4px;}
.login-btn:hover{background:var(--green-d);}
.login-err{background:var(--red-l);color:#a32d2d;font-size:12px;border-radius:var(--radius);padding:8px 12px;margin-bottom:12px;display:none;}

/* ===== ADMIN SHELL ===== */
.admin-shell{display:none;min-height:100vh;flex-direction:column;}
.admin-nav{height:50px;background:var(--green-dd);display:flex;align-items:center;padding:0 20px;gap:12px;position:sticky;top:0;z-index:100;}
.admin-nav-title{font-size:14px;font-weight:700;color:white;}
.admin-nav-badge{background:rgba(255,255,255,.15);color:white;font-size:11px;padding:2px 10px;border-radius:20px;font-weight:600;}
.admin-nav-right{margin-left:auto;display:flex;gap:8px;align-items:center;}
.portal-link{font-size:12px;color:rgba(255,255,255,.8);border:0.5px solid rgba(255,255,255,.3);border-radius:6px;padding:5px 12px;cursor:pointer;text-decoration:none;transition:all .15s;}
.portal-link:hover{background:rgba(255,255,255,.1);}
.logout-btn{font-size:12px;color:rgba(255,255,255,.7);border:none;background:none;cursor:pointer;padding:5px 10px;}
.logout-btn:hover{color:white;}

.admin-body{display:grid;grid-template-columns:220px 1fr;flex:1;}

/* SIDEBAR */
.sidebar{background:white;border-right:0.5px solid var(--border);padding:16px 12px;display:flex;flex-direction:column;gap:4px;}
.sb-item{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:var(--radius);font-size:13px;cursor:pointer;color:var(--text2);transition:all .15s;border:none;background:none;width:100%;text-align:left;}
.sb-item:hover{background:#f5f4f1;color:var(--text);}
.sb-item.active{background:var(--green-l);color:var(--green-dd);font-weight:600;}
.sb-sep{height:0.5px;background:var(--border);margin:8px 0;}
.sb-section{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;padding:8px 12px 4px;}

/* MAIN */
.admin-main{padding:20px;overflow:auto;}
.admin-page{display:none;}
.admin-page.active{display:block;}
.page-title{font-size:18px;font-weight:700;margin-bottom:16px;}

/* UPLOAD ZONE */
.upload-zone{border:2px dashed var(--border);border-radius:var(--radius-lg);padding:32px;text-align:center;cursor:pointer;transition:all .15s;background:var(--surface);margin-bottom:16px;}
.upload-zone:hover,.upload-zone.drag{border-color:var(--green);background:var(--green-l);}
.upload-zone-icon{font-size:36px;margin-bottom:8px;}
.upload-zone-text{font-size:14px;font-weight:600;margin-bottom:4px;}
.upload-zone-sub{font-size:12px;color:var(--text2);}
#upload-input{display:none;}

/* META FORM */
.meta-form{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:16px;}
.form-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px;align-items:end;}
.form-group label{font-size:11px;font-weight:600;color:var(--text2);display:block;margin-bottom:5px;}
.form-group select,.form-group input{width:100%;height:36px;border:0.5px solid var(--border);border-radius:var(--radius);padding:0 10px;font-size:13px;background:var(--surface);color:var(--text);outline:none;transition:border-color .15s;}
.form-group select:focus,.form-group input:focus{border-color:var(--green);}
.urgent-row{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.urgent-row input[type=checkbox]{width:16px;height:16px;accent-color:var(--red);cursor:pointer;}
.urgent-row label{font-size:13px;font-weight:600;color:#a32d2d;cursor:pointer;}
.upload-btn{height:38px;background:var(--green);color:white;border:none;border-radius:var(--radius);padding:0 20px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .15s;}
.upload-btn:hover{background:var(--green-d);}
.upload-btn:disabled{opacity:.5;cursor:not-allowed;}

/* PENDING LIST */
.pending-item{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:10px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;}
.pending-thumb{width:36px;height:48px;background:#eceae4;border-radius:4px;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.pending-thumb canvas{width:100%;height:100%;object-fit:cover;}
.pending-name{font-size:13px;font-weight:600;flex:1;}
.pending-pages{font-size:11px;color:var(--text3);}
.btn-remove{background:none;border:0.5px solid var(--border);border-radius:var(--radius);padding:4px 10px;font-size:11px;color:var(--text2);cursor:pointer;}
.btn-remove:hover{border-color:var(--red);color:var(--red);}

/* MANAGE TABLE */
.manage-toolbar{display:flex;gap:8px;margin-bottom:12px;align-items:center;}
.manage-search{flex:1;height:36px;border:0.5px solid var(--border);border-radius:var(--radius);padding:0 12px;font-size:13px;outline:none;}
.manage-search:focus{border-color:var(--green);}
.tag-filter{height:36px;border:0.5px solid var(--border);border-radius:var(--radius);padding:0 10px;font-size:13px;background:var(--surface);outline:none;}
.doc-table{width:100%;border-collapse:collapse;background:var(--surface);border-radius:var(--radius-lg);overflow:hidden;border:0.5px solid var(--border);}
.doc-table th{background:#f5f4f1;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;padding:10px 12px;text-align:left;border-bottom:0.5px solid var(--border);}
.doc-table td{padding:10px 12px;border-bottom:0.5px solid var(--border);font-size:13px;vertical-align:middle;}
.doc-table tr:last-child td{border-bottom:none;}
.doc-table tr:hover td{background:#fafaf8;}
.doc-thumb-cell{width:36px;height:48px;background:#eceae4;border-radius:4px;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.doc-thumb-cell img{width:100%;height:100%;object-fit:cover;}
.nbadge{font-size:10px;font-weight:600;border-radius:4px;padding:2px 7px;white-space:nowrap;}
.bs{background:var(--red-l);color:#a32d2d;}
.bn{background:var(--amber-l);color:#854f0b;}
.br{background:var(--green-l);color:var(--green-dd);}
.bb{background:var(--blue-l);color:#185fa5;}
.urgent-mark{background:var(--red);color:white;font-size:10px;padding:1px 5px;border-radius:3px;font-weight:600;}
.action-btn{background:none;border:0.5px solid var(--border);border-radius:var(--radius);padding:4px 10px;font-size:11px;cursor:pointer;margin-right:4px;transition:all .15s;}
.action-btn:hover{border-color:var(--green);color:var(--green);}
.action-del{border-color:var(--border);}
.action-del:hover{border-color:var(--red);color:var(--red);}

/* PROGRESS */
.progress-bar-wrap{background:#eceae4;border-radius:20px;height:6px;margin-top:8px;overflow:hidden;}
.progress-bar{height:100%;background:var(--green);border-radius:20px;transition:width .3s;}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:var(--green-dd);color:white;padding:10px 18px;border-radius:var(--radius);font-size:13px;font-weight:600;z-index:9999;transform:translateY(100px);opacity:0;transition:all .3s;pointer-events:none;}
.toast.show{transform:translateY(0);opacity:1;}
.ring{width:18px;height:18px;border:2px solid rgba(0,0,0,.15);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div class="login-wrap" id="login-wrap">
  <div class="login-box">
    <div class="login-logo"><svg viewBox="0 0 16 16"><rect x="2" y="2" width="5" height="5" rx="1"/><rect x="9" y="2" width="5" height="5" rx="1"/><rect x="2" y="9" width="5" height="5" rx="1"/><rect x="9" y="9" width="5" height="5" rx="1"/></svg></div>
    <div class="login-title">管理者ログイン</div>
    <div class="login-sub">社内ポータル — 管理者専用</div>
    <div class="login-err" id="login-err">IDまたはパスワードが違います</div>
    <label class="login-label">管理者ID</label>
    <input class="login-input" type="text" id="login-id" placeholder="admin" autocomplete="off">
    <label class="login-label">パスワード</label>
    <input class="login-input" type="password" id="login-pw" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">ログイン</button>
    <div style="margin-top:16px;font-size:11px;color:var(--text3);text-align:center;">デモ用：ID <b>admin</b> / PW <b>portal2025</b></div>
  </div>
</div>

<!-- ===== ADMIN SHELL ===== -->
<div class="admin-shell" id="admin-shell">
  <nav class="admin-nav">
    <svg width="18" height="18" viewBox="0 0 16 16" fill="rgba(255,255,255,.7)"><rect x="2" y="2" width="5" height="5" rx="1"/><rect x="9" y="2" width="5" height="5" rx="1"/><rect x="2" y="9" width="5" height="5" rx="1"/><rect x="9" y="9" width="5" height="5" rx="1"/></svg>
    <div class="admin-nav-title">社内ポータル</div>
    <span class="admin-nav-badge">⚙ 管理者</span>
    <div class="admin-nav-right">
      <a class="portal-link" href="index.html">← 一般ページへ</a>
      <button class="logout-btn" onclick="doLogout()">ログアウト</button>
    </div>
  </nav>

  <div class="admin-body">
    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sb-section">メニュー</div>
      <button class="sb-item active" onclick="showAdmin('upload',this)">📤 PDFアップロード</button>
      <button class="sb-item" onclick="showAdmin('manage',this)">📋 ドキュメント管理</button>
      <div class="sb-sep"></div>
      <div class="sb-section">設定</div>
      <button class="sb-item" onclick="showAdmin('settings',this)">⚙ サイト設定</button>
      <button class="sb-item" onclick="showAdmin('password',this)">🔑 パスワード変更</button>
      <div class="sb-sep"></div>
      <div style="padding:12px;font-size:11px;color:var(--text3);">
        <div>登録ドキュメント数</div>
        <div style="font-size:22px;font-weight:700;color:var(--text);margin-top:2px;" id="sb-count">0</div>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="admin-main">

      <!-- UPLOAD PAGE -->
      <div class="admin-page active" id="ap-upload">
        <div class="page-title">📤 PDFアップロード</div>

        <div class="upload-zone" id="upload-zone" onclick="document.getElementById('upload-input').click()" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">
          <input type="file" id="upload-input" accept=".pdf" multiple onchange="onFileSelect(event)">
          <div class="upload-zone-icon">📄</div>
          <div class="upload-zone-text">クリック または ドラッグ＆ドロップ</div>
          <div class="upload-zone-sub">PDF ファイル（複数選択可）</div>
        </div>

        <div id="pending-list"></div>

        <div class="meta-form" id="meta-form" style="display:none">
          <div style="font-size:13px;font-weight:700;margin-bottom:14px;color:var(--text2);">アップロード設定</div>
          <div class="form-row">
            <div class="form-group">
              <label>カテゴリ</label>
              <select id="meta-tag">
                <option value="rule">📋 規約・規程</option>
                <option value="security">🔒 セキュリティ</option>
                <option value="notice">📢 連絡事項</option>
                <option value="other">その他</option>
              </select>
            </div>
            <div class="form-group">
              <label>公開日</label>
              <input type="date" id="meta-date">
            </div>
            <div class="form-group">
              <label style="opacity:0">　</label>
              <div class="urgent-row">
                <input type="checkbox" id="meta-urgent">
                <label for="meta-urgent">⚠ 重要（アラート表示）</label>
              </div>
            </div>
          </div>
          <button class="upload-btn" id="do-upload-btn" onclick="doUpload()">
            <span>✓ アップロードして公開</span>
          </button>
        </div>
      </div>

      <!-- MANAGE PAGE -->
      <div class="admin-page" id="ap-manage">
        <div class="page-title">📋 ドキュメント管理</div>
        <div class="manage-toolbar">
          <input class="manage-search" type="text" placeholder="ファイル名で検索..." oninput="renderManage(this.value)">
          <select class="tag-filter" onchange="renderManage(document.querySelector('.manage-search').value,this.value)" id="manage-tag-filter">
            <option value="">すべてのカテゴリ</option>
            <option value="rule">規約・規程</option>
            <option value="security">セキュリティ</option>
            <option value="notice">連絡事項</option>
            <option value="other">その他</option>
          </select>
        </div>
        <table class="doc-table">
          <thead>
            <tr>
              <th style="width:50px">プレビュー</th>
              <th>ファイル名</th>
              <th style="width:100px">カテゴリ</th>
              <th style="width:90px">公開日</th>
              <th style="width:60px">ページ数</th>
              <th style="width:140px">操作</th>
            </tr>
          </thead>
          <tbody id="manage-tbody"></tbody>
        </table>
      </div>

      <!-- SETTINGS PAGE -->
      <div class="admin-page" id="ap-settings">
        <div class="page-title">⚙ サイト設定</div>
        <div style="background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:20px;max-width:480px;">
          <div class="form-group" style="margin-bottom:14px;">
            <label>ポータル名</label>
            <input type="text" id="set-portal-name" placeholder="社内ポータル" value="社内ポータル" style="width:100%;height:36px;border:0.5px solid var(--border);border-radius:var(--radius);padding:0 10px;font-size:13px;">
          </div>
          <div class="form-group" style="margin-bottom:14px;">
            <label>ログインユーザー名（表示用）</label>
            <input type="text" id="set-username" placeholder="田中" value="田中" style="width:100%;height:36px;border:0.5px solid var(--border);border-radius:var(--radius);padding:0 10px;font-size:13px;">
          </div>
          <button class="upload-btn" onclick="saveSettings()">設定を保存</button>
        </div>
      </div>

      <!-- PASSWORD PAGE -->
      <div class="admin-page" id="ap-password">
        <div class="page-title">🔑 管理者パスワード変更</div>
        <div style="background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:20px;max-width:380px;">
          <div style="font-size:12px;color:var(--text2);background:var(--amber-l);border-radius:var(--radius);padding:10px;margin-bottom:16px;">⚠ パスワードはブラウザのLocalStorageに保存されます。本番運用ではサーバー側認証を推奨します。</div>
          <div class="form-group" style="margin-bottom:12px;">
            <label>現在のパスワード</label>
            <input type="password" id="pw-current" style="width:100%;height:36px;border:0.5px solid var(--border);border-radius:var(--radius);padding:0 10px;font-size:13px;">
          </div>
          <div class="form-group" style="margin-bottom:12px;">
            <label>新しいパスワード</label>
            <input type="password" id="pw-new" style="width:100%;height:36px;border:0.5px solid var(--border);border-radius:var(--radius);padding:0 10px;font-size:13px;">
          </div>
          <div class="form-group" style="margin-bottom:16px;">
            <label>新しいパスワード（確認）</label>
            <input type="password" id="pw-confirm" style="width:100%;height:36px;border:0.5px solid var(--border);border-radius:var(--radius);padding:0 10px;font-size:13px;">
          </div>
          <button class="upload-btn" onclick="changePassword()">パスワードを変更</button>
          <div id="pw-msg" style="margin-top:10px;font-size:12px;"></div>
        </div>
      </div>

    </main>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const STORE_KEY='portal_docs';
const PW_KEY='portal_admin_pw';
const DEFAULT_ID='admin';
const DEFAULT_PW='portal2025';

const TAG={
  security:{label:'セキュリティ',cls:'bs'},
  rule:{label:'規約・規程',cls:'br'},
  notice:{label:'連絡事項',cls:'bn'},
  other:{label:'その他',cls:'bb'}
};

let docs=[];
let pendingFiles=[];
let loggedIn=false;

// ===== AUTH =====
function getStoredPw(){ return localStorage.getItem(PW_KEY)||DEFAULT_PW; }

function doLogin(){
  const id=document.getElementById('login-id').value.trim();
  const pw=document.getElementById('login-pw').value;
  if(id===DEFAULT_ID && pw===getStoredPw()){
    loggedIn=true;
    document.getElementById('login-wrap').style.display='none';
    document.getElementById('admin-shell').style.display='flex';
    loadDocs();
    renderManage();
    updateSbCount();
    // 今日の日付をデフォルト
    document.getElementById('meta-date').value=new Date().toISOString().slice(0,10);
  } else {
    document.getElementById('login-err').style.display='block';
  }
}

function doLogout(){
  loggedIn=false;
  document.getElementById('admin-shell').style.display='none';
  document.getElementById('login-wrap').style.display='flex';
  document.getElementById('login-id').value='';
  document.getElementById('login-pw').value='';
  document.getElementById('login-err').style.display='none';
}

function changePassword(){
  const cur=document.getElementById('pw-current').value;
  const nw=document.getElementById('pw-new').value;
  const cf=document.getElementById('pw-confirm').value;
  const msg=document.getElementById('pw-msg');
  if(cur!==getStoredPw()){msg.style.color='#a32d2d';msg.textContent='現在のパスワードが違います';return;}
  if(nw.length<6){msg.style.color='#a32d2d';msg.textContent='6文字以上で設定してください';return;}
  if(nw!==cf){msg.style.color='#a32d2d';msg.textContent='新しいパスワードが一致しません';return;}
  localStorage.setItem(PW_KEY,nw);
  msg.style.color='var(--green)';
  msg.textContent='パスワードを変更しました';
  ['pw-current','pw-new','pw-confirm'].forEach(id=>document.getElementById(id).value='');
}

// ===== DATA =====
function loadDocs(){
  try{ const r=localStorage.getItem(STORE_KEY); docs=r?JSON.parse(r):[]; }
  catch(e){ docs=[]; }
}

function saveDocs(){
  localStorage.setItem(STORE_KEY,JSON.stringify(docs));
}

function updateSbCount(){
  document.getElementById('sb-count').textContent=docs.length;
}

// ===== SIDEBAR NAV =====
function showAdmin(id,btn){
  document.querySelectorAll('.admin-page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.sb-item').forEach(b=>b.classList.remove('active'));
  document.getElementById('ap-'+id).classList.add('active');
  if(btn) btn.classList.add('active');
  if(id==='manage') renderManage();
}

// ===== UPLOAD =====
function onDragOver(e){ e.preventDefault(); document.getElementById('upload-zone').classList.add('drag'); }
function onDragLeave(e){ document.getElementById('upload-zone').classList.remove('drag'); }
function onDrop(e){
  e.preventDefault();
  document.getElementById('upload-zone').classList.remove('drag');
  handleFiles([...e.dataTransfer.files].filter(f=>f.type==='application/pdf'));
}
function onFileSelect(e){ handleFiles([...e.target.files]); e.target.value=''; }

async function handleFiles(files){
  for(const f of files){
    const url=URL.createObjectURL(f);
    const pdf=await pdfjsLib.getDocument(url).promise;
    const page=await pdf.getPage(1);
    const vp=page.getViewport({scale:0.7});
    const canvas=document.createElement('canvas');
    canvas.width=vp.width; canvas.height=vp.height;
    await page.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise;
    const thumbData=canvas.toDataURL('image/jpeg',0.7);
    pendingFiles.push({name:f.name,url,numPages:pdf.numPages,thumbData});
  }
  renderPending();
  document.getElementById('meta-form').style.display=pendingFiles.length?'block':'none';
}

function renderPending(){
  const el=document.getElementById('pending-list');
  if(!pendingFiles.length){ el.innerHTML=''; return; }
  el.innerHTML=pendingFiles.map((f,i)=>`
    <div class="pending-item">
      <div class="pending-thumb"><img src="${f.thumbData}" style="width:100%;height:100%;object-fit:cover;"></div>
      <div style="flex:1">
        <div class="pending-name">${f.name}</div>
        <div class="pending-pages">${f.numPages}ページ</div>
        <div class="progress-bar-wrap" id="prog_${i}" style="display:none"><div class="progress-bar" style="width:0%" id="progbar_${i}"></div></div>
      </div>
      <button class="btn-remove" onclick="removePending(${i})">削除</button>
    </div>`).join('');
}

function removePending(i){
  pendingFiles.splice(i,1);
  renderPending();
  if(!pendingFiles.length) document.getElementById('meta-form').style.display='none';
}

async function doUpload(){
  if(!pendingFiles.length) return;
  const tag=document.getElementById('meta-tag').value;
  const date=document.getElementById('meta-date').value||new Date().toISOString().slice(0,10);
  const urgent=document.getElementById('meta-urgent').checked;
  const btn=document.getElementById('do-upload-btn');
  btn.disabled=true; btn.innerHTML='<div class="ring"></div><span>処理中...</span>';

  for(let i=0;i<pendingFiles.length;i++){
    const f=pendingFiles[i];
    // プログレス表示
    document.getElementById('prog_'+i).style.display='block';
    document.getElementById('progbar_'+i).style.width='60%';

    const id='doc_'+Date.now()+'_'+i;
    docs.unshift({id,name:f.name,tag,date,urgent,url:f.url,numPages:f.numPages,thumbData:f.thumbData});
    document.getElementById('progbar_'+i).style.width='100%';
    await new Promise(r=>setTimeout(r,200));
  }

  saveDocs();
  showToast(`${pendingFiles.length}件のPDFを公開しました ✓`);
  pendingFiles=[];
  renderPending();
  document.getElementById('meta-form').style.display='none';
  document.getElementById('meta-urgent').checked=false;
  btn.disabled=false; btn.innerHTML='<span>✓ アップロードして公開</span>';
  updateSbCount();
}

// ===== MANAGE =====
function renderManage(q='',tagFilter=''){
  const tbody=document.getElementById('manage-tbody');
  let filtered=[...docs].sort((a,b)=>new Date(b.date)-new Date(a.date));
  if(q) filtered=filtered.filter(d=>d.name.toLowerCase().includes(q.toLowerCase()));
  if(tagFilter) filtered=filtered.filter(d=>d.tag===tagFilter);

  if(!filtered.length){
    tbody.innerHTML='<tr><td colspan="6" style="text-align:center;color:var(--text3);padding:32px;">ドキュメントがありません</td></tr>';
    return;
  }
  tbody.innerHTML=filtered.map(d=>{
    const t=TAG[d.tag];
    return `<tr>
      <td><div class="doc-thumb-cell">${d.thumbData?`<img src="${d.thumbData}">`:'📄'}</div></td>
      <td>
        <div style="font-size:13px;font-weight:600;line-height:1.4;">${d.name}</div>
        ${d.urgent?'<span class="urgent-mark">⚠ 重要</span>':''}
      </td>
      <td><span class="nbadge ${t.cls}">${t.label}</span></td>
      <td style="font-size:12px;color:var(--text2);">${d.date}</td>
      <td style="font-size:12px;color:var(--text2);text-align:center;">${d.numPages||'?'}</td>
      <td>
        <button class="action-btn" onclick="toggleUrgent('${d.id}')">${d.urgent?'⚠解除':'⚠重要'}
        </button>
        <button class="action-btn action-del" onclick="deleteDoc('${d.id}')">削除</button>
      </td>
    </tr>`;
  }).join('');
}

function deleteDoc(id){
  if(!confirm('このドキュメントを削除しますか？')) return;
  docs=docs.filter(d=>d.id!==id);
  saveDocs();
  renderManage(document.querySelector('.manage-search').value, document.getElementById('manage-tag-filter').value);
  updateSbCount();
  showToast('削除しました');
}

function toggleUrgent(id){
  const d=docs.find(x=>x.id===id);
  if(!d) return;
  d.urgent=!d.urgent;
  saveDocs();
  renderManage(document.querySelector('.manage-search').value, document.getElementById('manage-tag-filter').value);
  showToast(d.urgent?'重要フラグを設定しました':'重要フラグを解除しました');
}

// ===== SETTINGS =====
function saveSettings(){
  showToast('設定を保存しました（デモ）');
}

// ===== TOAST =====
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
</script>
</body>
</html>
