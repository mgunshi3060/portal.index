<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>社内ポータル</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --green:#1D9E75;--green-d:#0F6E56;--green-dd:#085041;--green-l:#E1F5EE;
  --red:#E24B4A;--red-l:#FCEBEB;--amber:#EF9F27;--amber-l:#FAEEDA;
  --blue:#378ADD;--blue-l:#E6F1FB;
  --bg:#f5f4f1;--surface:#fff;--border:rgba(0,0,0,0.09);
  --text:#1a1a1a;--text2:#666;--text3:#999;
  --radius:10px;--radius-lg:14px;
  --nav-h:52px;
}
html{-webkit-text-size-adjust:100%;}
body{font-family:'Hiragino Sans','Yu Gothic UI',sans-serif;font-size:14px;color:var(--text);background:var(--bg);padding-bottom:env(safe-area-inset-bottom);}
a{color:inherit;text-decoration:none;}
button{font-family:inherit;}

/* ===== TOP NAV (PC) ===== */
.nav{height:var(--nav-h);background:var(--surface);border-bottom:0.5px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:4px;position:sticky;top:0;z-index:200;box-shadow:0 1px 4px rgba(0,0,0,0.05);}
.nav-logo{width:30px;height:30px;background:var(--green);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-right:4px;}
.nav-logo svg{width:16px;height:16px;fill:white;}
.nav-name{font-size:13px;font-weight:700;color:var(--green-dd);margin-right:6px;white-space:nowrap;}
.nav-tab{padding:6px 12px;border-radius:var(--radius);font-size:12px;cursor:pointer;color:var(--text2);border:none;background:none;white-space:nowrap;transition:all .15s;}
.nav-tab:hover{background:#f0f0ee;color:var(--text);}
.nav-tab.active{background:var(--green-l);color:var(--green-dd);font-weight:600;}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.nav-avatar{width:30px;height:30px;border-radius:50%;background:var(--green);color:white;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.admin-link{font-size:11px;color:var(--text3);padding:4px 10px;border:0.5px solid var(--border);border-radius:20px;cursor:pointer;transition:all .15s;white-space:nowrap;}
.admin-link:hover{color:var(--green);border-color:var(--green);}

/* ===== BOTTOM TAB NAV (mobile) ===== */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:0.5px solid var(--border);z-index:200;padding-bottom:env(safe-area-inset-bottom);box-shadow:0 -1px 8px rgba(0,0,0,.06);}
.bottom-nav-inner{display:flex;align-items:center;justify-content:space-around;height:56px;}
.bn-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:var(--text3);border:none;background:none;padding:6px 0;transition:color .15s;}
.bn-tab.active{color:var(--green);}
.bn-tab-icon{font-size:20px;line-height:1;}
.bn-tab-label{font-size:10px;font-weight:600;}

/* ===== PAGE ===== */
.page{display:none;padding:14px;max-width:900px;margin:0 auto;}
.page.active{display:block;}
.section-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:8px;}

/* ===== HERO ===== */
.hero{background:linear-gradient(135deg,var(--green) 0%,var(--green-d) 100%);border-radius:var(--radius-lg);padding:18px 20px 16px;color:white;margin-bottom:12px;position:relative;overflow:hidden;}
.hero::after{content:'';position:absolute;right:-20px;top:-20px;width:120px;height:120px;background:rgba(255,255,255,.07);border-radius:50%;}
.hero-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.hero-greeting h1{font-size:17px;font-weight:700;margin-bottom:2px;}
.hero-greeting p{font-size:11px;opacity:.8;}
.hero-date-block{text-align:right;flex-shrink:0;}
.hero-date{font-size:12px;opacity:.8;background:rgba(255,255,255,.15);border-radius:6px;padding:3px 10px;display:inline-block;}
.hero-event{margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.2);}
.hero-event-title{font-size:10px;font-weight:600;opacity:.7;margin-bottom:6px;letter-spacing:.5px;}
.hero-event-list{display:flex;flex-wrap:wrap;gap:6px;}
.hero-event-chip{background:rgba(255,255,255,.18);border-radius:20px;padding:4px 11px;font-size:11px;font-weight:600;display:flex;align-items:center;gap:5px;}
.hero-event-chip-date{opacity:.75;font-size:10px;}
.hero-loading{font-size:11px;opacity:.6;}

/* ===== ALERT ===== */
.alert{background:var(--red-l);border:0.5px solid #f7c1c1;border-radius:var(--radius);padding:10px 14px;display:flex;gap:8px;align-items:center;margin-bottom:10px;}
.alert-dot{width:7px;height:7px;background:var(--red);border-radius:50%;flex-shrink:0;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.alert-text{font-size:12px;color:#a32d2d;font-weight:600;}

/* ===== STATS ===== */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
.stat{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:10px 12px;}
.stat-label{font-size:10px;color:var(--text2);margin-bottom:2px;}
.stat-val{font-size:20px;font-weight:700;}

/* ===== TWO COL ===== */
.two-col{display:grid;grid-template-columns:1fr 280px;gap:12px;}
.card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:12px 14px;}

/* ===== NEWS LIST ===== */
.news-item{display:flex;gap:10px;padding:9px 0;border-bottom:0.5px solid var(--border);align-items:flex-start;cursor:pointer;transition:opacity .15s;}
.news-item:hover{opacity:.7;}
.news-item:last-child{border-bottom:none;}
.nbadge{font-size:10px;font-weight:600;border-radius:4px;padding:2px 7px;white-space:nowrap;margin-top:1px;flex-shrink:0;}
.bs{background:var(--red-l);color:#a32d2d;}.bn{background:var(--amber-l);color:#854f0b;}
.br{background:var(--green-l);color:var(--green-dd);}.bb{background:var(--blue-l);color:#185fa5;}
.news-title{font-size:12px;font-weight:600;line-height:1.4;}
.news-date{font-size:10px;color:var(--text3);margin-top:2px;}

/* ===== QUICK LINKS ===== */
.ql-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:12px;}
.ql-item{background:#f5f4f1;border-radius:var(--radius);padding:10px;cursor:pointer;display:flex;align-items:center;gap:8px;border:0.5px solid transparent;transition:all .15s;}
.ql-item:hover{background:var(--surface);border-color:var(--border);}
.ql-icon{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.ql-label{font-size:12px;font-weight:600;}
.ql-sub{font-size:10px;color:var(--text2);}


/* ===== WEATHER ===== */
.weather-chip{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.18);border-radius:20px;padding:4px 10px;}
.weather-icon{font-size:18px;line-height:1;}
.weather-temp{font-size:13px;font-weight:700;color:white;}
.weather-desc{font-size:10px;opacity:.8;color:white;}
.weather-loc{font-size:10px;opacity:.65;color:white;}
/* ===== UPCOMING EVENTS WIDGET ===== */
.event-widget{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:12px 14px;margin-bottom:12px;}
.event-item{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:0.5px solid var(--border);}
.event-item:last-child{border-bottom:none;}
.event-date-badge{width:38px;height:38px;border-radius:8px;background:var(--green-l);color:var(--green-dd);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;}
.event-date-m{font-size:9px;font-weight:600;line-height:1;}
.event-date-d{font-size:15px;font-weight:700;line-height:1.1;}
.event-info{flex:1;min-width:0;}
.event-name{font-size:13px;font-weight:600;line-height:1.3;}
.event-time{font-size:10px;color:var(--text3);margin-top:1px;}
.event-today{background:var(--green);color:white;}
.event-today .event-date-m,.event-today .event-date-d{color:white;}
.event-empty{font-size:12px;color:var(--text3);text-align:center;padding:14px 0;}

/* ===== BLOG GRID ===== */
.blog-mini-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.blog-mini-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;cursor:pointer;transition:border-color .15s;}
.blog-mini-card:hover{border-color:var(--green);}
.blog-mini-cover{height:60px;background:#eceae4;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.blog-mini-cover img{width:100%;height:100%;object-fit:cover;}
.blog-mini-body{padding:7px 9px;}
.blog-mini-cat{font-size:9px;font-weight:600;padding:1px 5px;border-radius:3px;display:inline-block;margin-bottom:4px;}
.blog-mini-title{font-size:11px;font-weight:600;line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.blog-mini-foot{font-size:9px;color:var(--text3);margin-top:3px;}

/* ===== NOTICE PAGE ===== */
.filter-row{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;align-items:center;}
.filter-btn{padding:5px 13px;border:0.5px solid var(--border);border-radius:20px;font-size:12px;background:var(--surface);cursor:pointer;color:var(--text2);transition:all .15s;}
.filter-btn:hover{border-color:var(--green);color:var(--green);}
.filter-btn.active{background:var(--green);color:white;border-color:var(--green);font-weight:600;}
.notice-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:12px 14px;margin-bottom:10px;display:flex;gap:12px;cursor:pointer;transition:border-color .15s;}
.notice-card:hover{border-color:var(--green);}
.notice-thumb{width:72px;height:96px;background:#eceae4;border-radius:var(--radius);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,.08);}
.notice-thumb img{width:100%;height:100%;object-fit:cover;}
.notice-body{flex:1;min-width:0;}
.notice-title{font-size:13px;font-weight:600;margin-bottom:4px;line-height:1.4;}
.notice-footer{font-size:10px;color:var(--text3);margin-top:6px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.pdf-icon-badge{display:inline-flex;align-items:center;gap:3px;background:var(--green-l);color:var(--green-dd);font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;}
.notice-dl{font-size:11px;color:var(--green);font-weight:600;border:0.5px solid var(--green);border-radius:6px;padding:4px 10px;margin-left:auto;white-space:nowrap;flex-shrink:0;align-self:flex-start;}

/* ===== MODAL ===== */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:300;align-items:center;justify-content:center;padding:16px;}
.modal-bg.open{display:flex;}
.modal-box{background:var(--surface);border-radius:var(--radius-lg);width:min(540px,100%);max-height:88vh;overflow:auto;display:flex;flex-direction:column;}
.modal-hd{padding:14px 16px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:10px;position:sticky;top:0;background:var(--surface);}
.modal-title{font-size:14px;font-weight:600;flex:1;}
.modal-close{background:none;border:none;font-size:18px;cursor:pointer;color:var(--text2);padding:2px 6px;line-height:1;}
.modal-pages{padding:14px;display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.page-th{border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden;aspect-ratio:3/4;display:flex;align-items:center;justify-content:center;background:#eceae4;position:relative;}
.page-th canvas{width:100%;height:100%;object-fit:cover;}
.page-num{position:absolute;bottom:4px;right:5px;font-size:9px;background:rgba(0,0,0,.4);color:white;padding:1px 5px;border-radius:3px;}
.ring{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite;display:inline-block;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ===== CALENDAR SETTINGS ===== */
.cal-settings-btn{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--text3);border:0.5px solid var(--border);border-radius:20px;padding:3px 10px;cursor:pointer;background:none;margin-top:8px;transition:all .15s;}
.cal-settings-btn:hover{color:var(--green);border-color:var(--green);}

/* ===== RESPONSIVE ===== */
@media(max-width:680px){
  /* ナビゲーション */
  .nav .nav-tab:not(.active){display:none;}
  .nav-name{font-size:12px;}
  .bottom-nav{display:block;}
  body{padding-bottom:calc(56px + env(safe-area-inset-bottom));}

  /* ページ */
  .page{padding:10px;}

  /* ヒーロー */
  .hero{padding:14px 16px 12px;}
  .hero-greeting h1{font-size:15px;}

  /* stats 2列 */
  .stats{grid-template-columns:1fr 1fr;}
  .stats .stat:last-child{display:none;}

  /* 1カラム */
  .two-col{grid-template-columns:1fr;}

  /* ブログ */
  .blog-mini-grid{grid-template-columns:1fr 1fr;}

  /* お知らせカード */
  .notice-thumb{width:54px;height:72px;}
  .notice-dl{display:none;}
}

@media(max-width:380px){
  .hero-event-chip{font-size:10px;padding:3px 8px;}
  .blog-mini-grid{grid-template-columns:1fr;}
}

/* Google Calendar設定モーダル（廃止） */
</style>
</head>

<!-- TOP NAV -->
<nav class="nav">
  <div class="nav-logo"><svg viewBox="0 0 16 16"><rect x="2" y="2" width="5" height="5" rx="1"/><rect x="9" y="2" width="5" height="5" rx="1"/><rect x="2" y="9" width="5" height="5" rx="1"/><rect x="9" y="9" width="5" height="5" rx="1"/></svg></div>

    </button>

</div>

<!-- ===== HOME ===== -->
<div class="page active" id="page-home">

    <div class="hero-top">

      <div style="display:flex;align-items:center;justify-content:space-between;margin-top:16px;margin-bottom:8px;">

</div>

<!-- ===== NOTICE ===== -->
<div class="page" id="page-notice">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">

    <span style="font-size:11px;color:var(--text3)">日付の新しい順</span>
  </div>
  <div class="filter-row">
    <button class="filter-btn active" onclick="filterNotice('all',this)">すべて</button>
    <button class="filter-btn" onclick="filterNotice('security',this)">🔒 セキュリティ</button>
    <button class="filter-btn" onclick="filterNotice('rule',this)">📋 規約・規程</button>
    <button class="filter-btn" onclick="filterNotice('notice',this)">📢 連絡事項</button>
    <button class="filter-btn" onclick="filterNotice('other',this)">その他</button>
  </div>
  <div id="notice-list"><div style="color:var(--text3);font-size:13px;text-align:center;padding:40px 0;">お知らせがありません</div></div>
</div>

<!-- ===== SECURITY ===== -->
<div class="page" id="page-security">
  <div style="font-size:17px;font-weight:600;margin-bottom:16px;">セキュリティ情報</div>
  <div style="color:var(--text2);text-align:center;padding:60px 0;">(準備中)</div>
</div>

<!-- ===== FILES ===== -->
<div class="page" id="page-files">
  <div style="font-size:17px;font-weight:600;margin-bottom:16px;">ファイル検索</div>
  <div style="color:var(--text2);text-align:center;padding:60px 0;">(準備中)</div>
</div>


<script>

// ===== CONSTANTS =====
const TAG={
  security:{label:'セキュリティ',bg:'#FCEBEB',color:'#A32D2D',cls:'bs'},
  rule:{label:'規約・規程',bg:'#E1F5EE',color:'#085041',cls:'br'},
  notice:{label:'連絡事項',bg:'#FAEEDA',color:'#854F0B',cls:'bn'},
  other:{label:'その他',bg:'#E6F1FB',color:'#185FA5',cls:'bb'}
};
const CAT_BLOG={
  tech:{label:'💡 技術',bg:'#E6F1FB',color:'#185fa5'},
  report:{label:'🏭 現場',bg:'#E1F5EE',color:'#085041'},
  idea:{label:'💭 アイデア',bg:'#FAEEDA',color:'#854f0b'},
  event:{label:'🎉 イベント',bg:'#EEEDFE',color:'#3C3489'},
  other:{label:'その他',bg:'#f5f4f1',color:'#666'}
};
const STORE_KEY='portal_docs';
const BLOG_KEY='portal_blogs';
const CAL_ID_KEY='portal_cal_id';
const CAL_KEY_KEY='portal_cal_key';
const GH_RAW='https://raw.githubusercontent.com/mgunshi3060/portal.index/main/';

let docs=[], blogs=[];

// ===== NAVIGATION =====
const PAGE_IDS=['home','notice','blog','security','files'];
const BNT_IDS=['bnt-home','bnt-notice',null,'bnt-security','bnt-files'];

function showPage(id,btn,idx){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.bn-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  if(btn) btn.classList.add('active');
  if(idx!==undefined && BNT_IDS[idx]) document.getElementById(BNT_IDS[idx]).classList.add('active');
  if(id==='notice') renderNotice();
  window.scrollTo(0,0);
}

// ===== GREETING =====
function updateGreeting(){
  const h=new Date().getHours();
  const greet=h<11?'おはようございます':h<18?'こんにちは':'こんばんは';
  document.getElementById('greeting-text').textContent=greet;

// ===== DATA =====
async function loadDocs(){
  try{
    const res=await fetch(GH_RAW+'data/docs.json?_='+Date.now());
    if(res.ok){ docs=await res.json(); localStorage.setItem(STORE_KEY,JSON.stringify(docs)); return; }
  }catch(e){}
  try{ const r=localStorage.getItem(STORE_KEY); if(r) docs=JSON.parse(r); }catch(e){ docs=[]; }
}
async function loadBlogs(){
  try{
    const res=await fetch(GH_RAW+'data/blogs.json?_='+Date.now());
    if(res.ok){ blogs=await res.json(); localStorage.setItem(BLOG_KEY,JSON.stringify(blogs)); return; }
  }catch(e){}
  try{ const r=localStorage.getItem(BLOG_KEY); blogs=r?JSON.parse(r):[]; }catch(e){ blogs=[]; }
}

// ===== DATE =====
function formatDateShort(d){ return (d.getMonth()+1)+'/'+(d.getDate()); }
function today(){ const d=new Date(); d.setHours(0,0,0,0); return d; }

// ===== EVENTS (GitHub events.json) =====
const EVENTS_KEY='portal_events';
let portalEvents=[];

async function loadAndRenderCalendar(){
  // GitHub から events.json を取得
  try{
    const res=await fetch(GH_RAW+'data/events.json?_='+Date.now());
    if(res.ok){ portalEvents=await res.json(); localStorage.setItem(EVENTS_KEY,JSON.stringify(portalEvents)); }
    else throw new Error('fetch failed');
  }catch(e){
    const r=localStorage.getItem(EVENTS_KEY);
    portalEvents=r?JSON.parse(r):[];
  }
  renderCalendarEvents();
}

function renderCalendarEvents(){
  const todayD=today();
  const todayStr=todayD.toISOString().slice(0,10);

  // 今日以降のイベントを日付順
  const upcoming=portalEvents
    .filter(ev=>ev.date>=todayStr)
    .sort((a,b)=>(a.date+(a.time||''))-(b.date+(b.time||'')));

  document.getElementById('stat-event').textContent=upcoming.length;

  // ===== ヒーロー内チップ（最大4件） =====
  const heroEl=document.getElementById('hero-event-list');
  const heroItems=upcoming.slice(0,4);
  if(!heroItems.length){
    heroEl.style.display='none';
  }else{
    heroEl.style.display='';
    heroEl.innerHTML=`<div class="hero-event"><div class="hero-event-title">直近の予定</div><div class="hero-event-list">`+
      heroItems.map(ev=>{
        const d=new Date(ev.date);
        const isToday=ev.date===todayStr;
        const weekdays=['日','月','火','水','木','金','土'];
        const dateLabel=isToday?'今日':`${d.getMonth()+1}/${d.getDate()}(${weekdays[d.getDay()]})`;
        const timeLabel=ev.time||'終日';
        return `<div class="hero-event-chip">
          <span class="hero-event-chip-date">${dateLabel}</span>
          <span>${ev.title}</span>
          ${ev.time?`<span class="hero-event-chip-date">${timeLabel}</span>`:''}
        </div>`;
      }).join('')+
    `</div></div>`;
  }

  // ===== サイドウィジェット（最大8件） =====
  const widget=document.getElementById('event-widget-main');
  const sideItems=upcoming.slice(0,8);
  if(!sideItems.length){
    widget.innerHTML='<div class="event-empty">直近の予定はありません<br><span style="font-size:10px;color:var(--text3);">管理者ページで行事を登録できます</span></div>';
    return;
  }
  widget.innerHTML=sideItems.map(ev=>{
    const d=new Date(ev.date);
    const isToday=ev.date===todayStr;
    const weekdays=['日','月','火','水','木','金','土'];
    const timeStr=ev.time||'終日';
    return `<div class="event-item">
      <div class="event-date-badge ${isToday?'event-today':''}">
        <div class="event-date-m">${d.getMonth()+1}月</div>
        <div class="event-date-d">${d.getDate()}</div>
      </div>
      <div class="event-info">
        <div class="event-name">
          ${ev.title}
          ${isToday?'<span style="font-size:9px;background:var(--red);color:white;padding:1px 5px;border-radius:3px;font-weight:600;margin-left:4px;">今日</span>':''}
        </div>
        <div class="event-time">${timeStr}${ev.note?'　'+ev.note:''}</div>
      </div>
    </div>`;
  }).join('');
}

// ===== HOME RENDER =====
function renderHomeNews(){
  const el=document.getElementById('home-news-list');
  const sorted=[...docs].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,5);
  const thisMonth=new Date(); thisMonth.setDate(1); thisMonth.setHours(0,0,0,0);
  document.getElementById('stat-notice').textContent=docs.filter(d=>new Date(d.date)>=thisMonth).length||0;
  const sdEl=document.getElementById('stat-docs'); if(sdEl) sdEl.textContent=docs.length;
  if(!sorted.length){el.innerHTML='<div style="color:var(--text3);font-size:13px;text-align:center;padding:20px 0;">お知らせがありません</div>';return;}
  el.innerHTML=sorted.map(d=>{
    const t=TAG[d.tag]||TAG.other;
    const dateStr=new Date(d.date).toLocaleDateString('ja-JP',{month:'2-digit',day:'2-digit'}).replace(/\//g,'-');
    const thumbHtml=d.thumbData
      ?`<div style="width:44px;height:58px;flex-shrink:0;border-radius:5px;overflow:hidden;background:#eceae4;box-shadow:0 1px 3px rgba(0,0,0,.1);"><img src="${d.thumbData}" style="width:100%;height:100%;object-fit:cover;"></div>`
      :`<div style="width:44px;height:58px;flex-shrink:0;border-radius:5px;background:#eceae4;display:flex;align-items:center;justify-content:center;font-size:18px;">📄</div>`;
    return `<div class="news-item" onclick="openPdfInBrowser('${d.id}')">
      ${thumbHtml}
      <div style="flex:1;min-width:0;">
        <div style="display:flex;gap:5px;align-items:center;margin-bottom:3px;flex-wrap:wrap;">
          <span class="nbadge ${t.cls}">${t.label}</span>
          ${d.urgent?'<span class="nbadge bs">⚠ 重要</span>':''}
        </div>
        <div class="news-title">${d.name.replace(/\.pdf$/i,'')}</div>
        ${d.comment?`<div style="font-size:10px;color:var(--text2);margin-top:3px;line-height:1.5;">💬 ${d.comment}</div>`:''}
        <div class="news-date">${dateStr}</div>
      </div>
    </div>`;
  }).join('');
}

// ===== NOTICE PAGE =====
let currentFilter='all';
function renderNotice(){
  const list=document.getElementById('notice-list');
  const sorted=[...docs].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const filtered=currentFilter==='all'?sorted:sorted.filter(d=>d.tag===currentFilter);
  if(!filtered.length){list.innerHTML='<div style="color:var(--text3);font-size:13px;text-align:center;padding:40px 0;">該当するお知らせがありません</div>';return;}
  list.innerHTML=filtered.map(d=>{
    const t=TAG[d.tag]||TAG.other;
    const dateStr=new Date(d.date).toLocaleDateString('ja-JP',{year:'numeric',month:'2-digit',day:'2-digit'}).replace(/\//g,'-');
    const isNew=(Date.now()-new Date(d.date).getTime())<86400000*3;
    return `<div class="notice-card" onclick="openPdfInBrowser('${d.id}')">
      <div class="notice-thumb">${d.thumbData?`<img src="${d.thumbData}" style="width:100%;height:100%;object-fit:cover;">`:'<span style="font-size:20px;">📄</span>'}</div>
      <div class="notice-body">
        <div style="display:flex;gap:6px;align-items:center;margin-bottom:6px;flex-wrap:wrap;">
          <span class="nbadge ${t.cls}">${t.label}</span>
          <span class="pdf-icon-badge">📄 PDF</span>
          ${isNew?'<span class="nbadge bs">NEW</span>':''}
          ${d.urgent?'<span class="nbadge bs">⚠ 重要</span>':''}
        </div>
        <div class="notice-title">${d.name.replace(/\.pdf$/i,'')}</div>
        ${d.comment?`<div style="font-size:11px;color:var(--text2);margin-top:4px;line-height:1.5;background:#f5f4f1;border-radius:5px;padding:5px 8px;">💬 ${d.comment}</div>`:''}
        <div class="notice-footer"><span>${dateStr}</span><span>${d.numPages||'?'}ページ</span></div>
      </div>
      <a class="notice-dl" href="${d.url}" download="${d.name}" onclick="event.stopPropagation()">⬇ DL</a>
    </div>`;
  }).join('');
}

function updateAlert(){
  const urgents=docs.filter(d=>d.urgent).sort((a,b)=>new Date(b.date)-new Date(a.date));
  const bar=document.getElementById('alert-bar');
  if(urgents.length){bar.style.display='flex';document.getElementById('alert-text').textContent='【重要】'+urgents[0].name.replace(/\.pdf$/i,'');}

// ===== PDF OPEN IN BROWSER =====
function openPdfInBrowser(id){
  const d=docs.find(x=>x.id===id);
  if(!d) return;
  if(d.url){
    // GitHub Pages URL (*.github.io) はそのままブラウザで開ける
    // raw.githubusercontent.com の場合は GitHub Pages URLに変換
    let url=d.url;
    if(url.includes('raw.githubusercontent.com')){
      // raw URL → GitHub Pages URL に変換
      // https://raw.githubusercontent.com/OWNER/REPO/BRANCH/pdfs/FILE
      // → https://OWNER.github.io/REPO/pdfs/FILE
      url=url.replace(
        /https:\/\/raw\.githubusercontent\.com\/([^/]+)\/([^/]+)\/[^/]+\/(.*)/,
        'https://$1.github.io/$2/$3'
      );
    }
    window.open(url,'_blank');
    return;
  }
  // base64の場合はBlobに変換してブラウザで開く
  if(d.pdfB64){
    try{
      const b64=d.pdfB64.includes(',') ? d.pdfB64.split(',')[1] : d.pdfB64;
      const bin=atob(b64);
      const arr=new Uint8Array(bin.length);
      for(let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
      const blob=new Blob([arr],{type:'application/pdf'});
      const blobUrl=URL.createObjectURL(blob);
      window.open(blobUrl,'_blank');
    }catch(e){ alert('PDFを開けませんでした'); }
    return;
  }
  alert('PDFのURLが見つかりません');
}


// ===== WEATHER (Open-Meteo / つくば市固定) =====
const WMO_ICONS={
  0:'☀️',1:'🌤',2:'⛅',3:'☁️',
  45:'🌫',48:'🌫',
  51:'🌦',53:'🌦',55:'🌧',
  61:'🌧',63:'🌧',65:'🌧',
  71:'🌨',73:'🌨',75:'🌨',77:'🌨',
  80:'🌦',81:'🌧',82:'🌧',
  95:'⛈',96:'⛈',99:'⛈'
};

// つくば市（緯度:36.0835, 経度:140.0764）固定
async function loadWeather(){
  const el=document.getElementById('weather-block');
  const lat=36.0835, lon=140.0764, cityName='つくば市';
  try{
    const wxRes=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weathercode,apparent_temperature&timezone=Asia%2FTokyo`);
    const wx=await wxRes.json();
    const cur=wx.current;
    const icon=WMO_ICONS[cur.weathercode]||'🌡';
    const temp=Math.round(cur.temperature_2m);
    const feel=Math.round(cur.apparent_temperature);
    el.innerHTML=`<div class="weather-chip">
      <span class="weather-icon">${icon}</span>
      <span class="weather-temp">${temp}°C</span>
      <span class="weather-desc">体感${feel}°</span>
      <span class="weather-loc">${cityName}</span>
    </div>`;
  }catch(e){
    el.innerHTML=`<span style="font-size:10px;opacity:.5;color:white;">⚠ 天気取得失敗</span>`;
    console.warn('Weather error:',e.message);
  }
}
